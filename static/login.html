<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Disaster MIS — Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .card {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      width: 380px;
    }
    h2 { text-align: center; color: #c0392b; margin-bottom: 8px; }
    p.subtitle { text-align: center; color: #888; font-size: 13px; margin-bottom: 28px; }
    label { font-size: 13px; color: #555; display: block; margin-bottom: 6px; }
    input {
      width: 100%; padding: 10px 14px;
      border: 1px solid #ddd; border-radius: 8px;
      font-size: 14px; margin-bottom: 18px; outline: none;
    }
    input:focus { border-color: #c0392b; }
    button {
      width: 100%; padding: 12px;
      background: #c0392b; color: white;
      border: none; border-radius: 8px;
      font-size: 15px; cursor: pointer;
    }
    button:hover { background: #a93226; }
    .error {
      color: red; font-size: 13px;
      text-align: center; margin-top: 12px; display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>Smart Disaster MIS</h2>
    <p class="subtitle">Management Information System</p>
    <label>Email</label>
    <input type="email" id="email" placeholder="Enter your email">
    <label>Password</label>
    <input type="password" id="password" placeholder="Enter your password">
    <button onclick="login()">Login</button>
    <p class="error" id="error-msg">Invalid email or password</p>
  </div>
  <script>
    async function login() {
      const email    = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (res.ok) {
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        window.location.href = '/dashboard.html';
      } else {
        document.getElementById('error-msg').style.display = 'block';
      }
    }
  </script>
</body>
</html>
