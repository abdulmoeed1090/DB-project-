<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Teams — Disaster MIS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #f0f2f5; }
    .navbar { background: #c0392b; padding: 14px 28px; display: flex; justify-content: space-between; align-items: center; color: white; }
    .navbar h1 { font-size: 18px; }
    .logout { background: rgba(255,255,255,0.2); border: none; color: white; padding: 6px 14px; border-radius: 6px; cursor: pointer; margin-left: 16px; }
    .nav-links { background: #922b21; display: flex; gap: 4px; padding: 8px 28px; }
    .nav-links a { color: rgba(255,255,255,0.8); text-decoration: none; padding: 6px 14px; border-radius: 6px; font-size: 13px; }
    .nav-links a:hover, .nav-links a.active { background: rgba(255,255,255,0.2); color: white; }
    .content { padding: 28px; }
    h2 { color: #333; margin-bottom: 20px; font-size: 20px; }
    .card { background: white; border-radius: 10px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-bottom: 20px; }
    .card h3 { font-size: 15px; color: #333; margin-bottom: 16px; }
    .form-row { display: flex; gap: 12px; align-items: flex-end; margin-bottom: 14px; }
    label { font-size: 12px; color: #666; display: block; margin-bottom: 4px; }
    input, select { width: 100%; padding: 9px 12px; border: 1px solid #ddd; border-radius: 7px; font-size: 13px; outline: none; }
    .btn { padding: 10px 20px; background: #c0392b; color: white; border: none; border-radius: 7px; cursor: pointer; font-size: 13px; white-space: nowrap; }
    .btn:hover { background: #a93226; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; padding: 10px 8px; background: #f8f8f8; color: #555; font-weight: 600; }
    td { padding: 10px 8px; border-bottom: 1px solid #f0f0f0; color: #333; }
    .badge { padding: 3px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; }
    .badge.available { background: #eafaf1; color: #27ae60; }
    .badge.busy      { background: #fef3e2; color: #e67e22; }
    .badge.assigned  { background: #eaf6ff; color: #2980b9; }
    .badge.completed { background: #f0f0f0; color: #888; }
    .success { color: green; font-size: 13px; margin-top: 10px; display: none; }
    .spinner { text-align: center; padding: 20px; color: #aaa; font-size: 13px; }
    .spinner::before {
      content: ''; display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid #ddd; border-top-color: #c0392b;
      border-radius: 50%; animation: spin 0.8s linear infinite;
      margin-right: 8px; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="navbar">
  <h1>Smart Disaster Response MIS</h1>
  <div style="display:flex;align-items:center">
    <span style="font-size:13px;opacity:.9" id="username">User</span>
    <button class="logout" onclick="logout()">Logout</button>
  </div>
</div>
<div class="nav-links">
  <a href="/dashboard.html">Dashboard</a>
  <a href="/reports.html">Reports</a>
  <a href="/teams.html" class="active">Teams</a>
  <a href="/inventory.html">Inventory</a>
  <a href="/finance.html">Finance</a>
</div>
<div class="content">
  <h2>Rescue Teams</h2>
  <div class="card">
    <h3>Assign Team to Report</h3>
    <div class="form-row">
      <div style="flex:1">
        <label>Team ID</label>
        <input type="number" id="team-id" placeholder="e.g. 2">
      </div>
      <div style="flex:1">
        <label>Report ID</label>
        <input type="number" id="report-id" placeholder="e.g. 1">
      </div>
      <button class="btn" onclick="assignTeam()">Assign Team</button>
    </div>
    <p class="success" id="success-msg">Team assigned successfully!</p>
  </div>
  <div class="card">
    <h3>All Rescue Teams</h3>
    <table>
      <thead>
        <tr><th>#</th><th>Team Name</th><th>Type</th><th>Location</th><th>Status</th><th>Total Assignments</th></tr>
      </thead>
      <tbody id="teams-table">
        <tr><td colspan="6" class="spinner">Fetching data...</td></tr>
      </tbody>
    </table>
  </div>
</div>
<script>
  const token = localStorage.getItem('token');
  const user  = JSON.parse(localStorage.getItem('user') || '{}');
  if (!token) window.location.href = '/';
  document.getElementById('username').textContent = user.Name || 'User';
  function logout() { localStorage.clear(); window.location.href = '/'; }
  function badge(text) {
    const cls = text ? text.toLowerCase() : '';
    return `<span class="badge ${cls}">${text}</span>`;
  }
  async function loadTeams() {
    const res  = await fetch('/api/teams', { headers: { 'Authorization': 'Bearer ' + token } });
    const data = await res.json();
    document.getElementById('teams-table').innerHTML = data.map(t => `
      <tr>
        <td>${t.TeamID}</td>
        <td>${t.TeamName}</td>
        <td>${t.TeamType}</td>
        <td>${t.CurrentLocation}</td>
        <td>${badge(t.AvailabilityStatus)}</td>
        <td>${t.TotalAssignments}</td>
      </tr>
    `).join('') || '<tr><td colspan="6" style="text-align:center;color:#aaa">No teams</td></tr>';
  }
  async function assignTeam() {
    const res = await fetch('/api/teams/assign', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({
        team_id:   parseInt(document.getElementById('team-id').value),
        report_id: parseInt(document.getElementById('report-id').value)
      })
    });
    if (res.ok) {
      document.getElementById('success-msg').style.display = 'block';
      setTimeout(() => document.getElementById('success-msg').style.display = 'none', 3000);
      loadTeams();
    }
  }
  loadTeams();
</script>
</body>
</html>
